<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cast Map — Cocodrie / Chauvin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  #map{position:absolute;inset:0}
  .ct{width:30px;height:30px;border-radius:50%;background:#d1603a;border:3px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;font-size:16px}
  .ct.first{box-shadow:0 0 0 4px rgba(224,163,43,.9),0 1px 4px rgba(0,0,0,.6)}
  .ttl{position:absolute;top:14px;left:14px;z-index:1000;background:rgba(31,36,33,.92);color:#f6f1e7;
       padding:9px 14px;border-radius:9px;font-size:17px;font-weight:800;letter-spacing:.2px;max-width:58%}
  .ttl small{display:block;font-size:12px;font-weight:600;opacity:.85;letter-spacing:0;margin-top:2px}
  .ttl a{color:#e0b45a;text-decoration:none;font-size:12px;font-weight:700}
  .leg{position:absolute;right:14px;top:14px;z-index:1000;background:rgba(255,250,240,.97);
       border:1.5px solid #7a2f12;border-radius:11px;padding:11px 13px;font-size:13px;max-width:340px;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .leg h4{margin:0 0 8px;font-size:14px;color:#7a2f12;font-weight:800}
  .leg .r{display:flex;align-items:center;gap:9px;margin:5px 0;line-height:1.25}
  .leg .b{width:21px;height:21px;border-radius:50%;background:#d1603a;color:#fff;font-weight:800;font-size:12px;
          display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .leg .w{font-weight:700;color:#2b3a44}
  .leg .x{color:#5a5a4a}
  .leg .haz{margin-top:8px;font-size:11.5px;color:#a33;font-weight:700;line-height:1.3}
  .cred{position:absolute;bottom:6px;right:8px;z-index:1000;background:rgba(255,255,255,.75);
        padding:1px 6px;border-radius:4px;font-size:10px;color:#333}
  .cmp{position:absolute;bottom:14px;left:14px;z-index:1000}
  .cmp svg{filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .leaflet-control-attribution{display:none}
</style>
</head>
<body>
<div id="map"></div>
<div class="ttl" id="ttl"></div>
<div class="leg" id="leg"></div>
<div class="cmp">
  <svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="22" fill="rgba(255,250,240,.95)" stroke="#27424a" stroke-width="1.5"/>
   <polygon points="26,8 31,27 26,23 21,27" fill="#b5532a"/><polygon points="26,44 31,25 26,29 21,25" fill="#8a8468"/>
   <circle cx="26" cy="26" r="2.6" fill="#27424a"/><text x="26" y="7" font-size="11" text-anchor="middle" font-weight="800" fill="#27424a" font-family="Arial">N</text></svg>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const SPOTS = {
 'lake-boudreaux':{
   title:'Lake Boudreaux — interior lake (from Boudreaux Canal)', sub:'Reds + trout · east-side reefs, north deep, marsh drains',
   center:[29.34800,-90.61000], zoom:14,
   targets:[
     {n:1,ll:[29.35000,-90.60700],w:'East-side oyster-reef drift',x:'trout — popping cork + live shrimp / Matrix Shad; drift, anchor on a bite'},
     {n:2,ll:[29.36000,-90.61200],w:'Deeper water just N of the lake',x:'bigger trout 19"+ — tight-line jig along the channel edge'},
     {n:3,ll:[29.35500,-90.60000],w:'6–8  ft dead-end canal (Madison side)',x:'post-front trout — slow plastic on the bottom'},
     {n:4,ll:[29.35800,-90.61500],w:'Broken marsh north — reds off the grass',x:'redfish — gold spoon / cork, 10–15 ft off the grass line'},
     {n:5,ll:[29.35200,-90.61800],w:'Marsh cut mouth, falling tide',x:'redfish — cast up the cut, drift bait out'}
   ],
   haz:'⚠️ Goes fresh/muddy after sustained rain — if it’s off-color & fresh, run south to the islands. Interior coords approximate: snap on satellite (qa.html) before relying.'
 },
 'sister-lake':{
   title:'Sister Lake / Caillou Lake (from Falgout Canal)', sub:'Trophy trout · surveyed limestone & cultch reefs',
   center:[29.24000,-90.93000], zoom:13,
   targets:[
     {n:1,ll:[29.24034,-90.93866],w:'2021 LDWF limestone reef — NW corner',x:'trout — fish the up-current edge; Carolina-rig live shrimp / cork (surveyed coord)'},
     {n:2,ll:[29.23600,-90.92100],w:'2012 cultch reef (most established shell)',x:'trout — popping cork over the shell (surveyed coord)'},
     {n:3,ll:[29.21000,-90.97000],w:'Grand Pass shell ledges',x:'post-front trout/reds — Carolina rig the east/west ledges, not the 40–50 ft bottom'},
     {n:4,ll:[29.25500,-90.92800],w:'North-shore flats — working birds',x:'early-Oct trout 14–18" under a cork; run to diving birds'},
     {n:5,ll:[29.21643,-90.94948],w:'Sunken barge near Red 4',x:'structure trout — AND a prop hazard; idle past'}
   ],
   haz:'☠️ Grand Pass runs 40–50 ft + the Red-4 sunken barge is a real prop hazard. Open lake — check the GMZ550 marine forecast before crossing.'
 },
 'robinson-canal':{
   title:'Robinson Canal marsh (from Lapeyrouse)', sub:'Redfish · pond drains, mini-deltas, cuts — falling tide',
   center:[29.29800,-90.64400], zoom:15,
   targets:[
     {n:1,ll:[29.30000,-90.64600],w:'Pond-drain mini-delta',x:'redfish — cast far up the drain, drift out, work both flanking points'},
     {n:2,ll:[29.30100,-90.64000],w:'Canal × Bayou Petit Caillou junction (shell)',x:'mixed — work the shell edge on the bayou side'},
     {n:3,ll:[29.29600,-90.64800],w:'Inter-pond cut — down-current side',x:'redfish — gold spoon / cork on the moving water'},
     {n:4,ll:[29.29900,-90.65000],w:'Grassy island point',x:'redfish — spoon / spinnerbait parallel to the bank'},
     {n:5,ll:[29.29700,-90.64400],w:'Canal-edge to pond drop (staging)',x:'reds staging — bounce a jig down the spoil-bank edge'}
   ],
   haz:'Interior-pond coords are approximate (no charted reef inside) — snap each on satellite (qa.html) before relying. Shell is an edge feature at the canal mouths, not in the ponds.'
 },
 'terrebonne-bay':{
   title:'Terrebonne Bay / Lake Barre (from CoCo Marina)', sub:'Trout + reds · surveyed Lake Barre reefs, channel edges',
   center:[29.28000,-90.57500], zoom:13,
   targets:[
     {n:1,ll:[29.28800,-90.58500],w:'Lake Barre reef — north center',x:'trout — Carolina-rig live shrimp over the shell (surveyed coord)'},
     {n:2,ll:[29.27000,-90.55700],w:'Lake Barre reef — south center',x:'trout — popping cork; drift the reef (surveyed coord)'},
     {n:3,ll:[29.29500,-90.57500],w:'North shoreline of Lake Barre',x:'fall holding trout — cork + live shrimp tight to the bank'},
     {n:4,ll:[29.25000,-90.62000],w:'Houma Nav. Canal channel edge',x:'post-front migration lane — tight-line the drop'},
     {n:5,ll:[29.30000,-90.55000],w:'Montegut-side red bayou mouth',x:'redfish — dead shrimp on the bottom (Bayou Dufrene / Barre area)'}
   ],
   haz:'⚠️ Open-bay run from Cocodrie — check the GMZ550 marine forecast & wind. Targets 4–5 are general areas, not pins: snap on satellite first.'
 },
 'pac-wma':{
   title:'Pointe-aux-Chenes WMA (from PAC Marina)', sub:'Redfish · weir outflows, trenasse mouths, bayou junctions',
   center:[29.43000,-90.46000], zoom:13,
   targets:[
     {n:1,ll:[29.44000,-90.46000],w:'Island Drive weir outflow',x:'reds + flounder — gold spoon in the moving water (top fall magnet)'},
     {n:2,ll:[29.41000,-90.44000],w:'Grand Bayou × PAC Bayou confluence',x:'mixed — work the junction current edges'},
     {n:3,ll:[29.43500,-90.47000],w:'Trenasse / ditch mouth, falling tide',x:'redfish — move pocket to pocket, cork or weedless spoon'},
     {n:4,ll:[29.40000,-90.42000],w:'Lake Chien south (saltier)',x:'speckled trout — near oyster in the deeper water'},
     {n:5,ll:[29.47000,-90.47000],w:'Humble Canal deep hole',x:'post-front fish — slow plastic on the bottom'}
   ],
   haz:'☠️ OCTOBER ACCESS: Sept–Jan NO internal-combustion engines in the WMA Limited Access Area — interior is trolling-motor / paddle ONLY; 25 HP cap in the units; free self-clearing permit required; heavily duck-hunted in fall. Run a boat to the south lakes & bayou arteries; paddle the interior. Coords approximate — verify.'
 }
};
const id = new URLSearchParams(location.search).get('id') || Object.keys(SPOTS)[0];
const cfg = SPOTS[id];
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView(cfg.center,cfg.zoom);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19}).addTo(map);
document.getElementById('ttl').innerHTML = cfg.title + '<small>'+cfg.sub+' &nbsp;·&nbsp; <a href="index.html">🗺️ all launches</a></small>';
let leg = '<h4>WHERE TO CAST</h4>';
function gm(ll){return `https://www.google.com/maps/search/?api=1&query=${ll[0]},${ll[1]}`;}
function gd(ll){return `https://www.google.com/maps/dir/?api=1&destination=${ll[0]},${ll[1]}`;}
cfg.targets.forEach(t=>{
  const ic = L.divIcon({className:'',html:`<div class="ct${t.n===1?' first':''}">${t.n}</div>`,iconSize:[30,30],iconAnchor:[15,15]});
  const pop = `<div style="font-size:13px;line-height:1.5;min-width:150px">
     <b>${t.n}. ${t.w}</b><br><span style="color:#5a5a4a">${t.x}</span>
     <div style="font-family:ui-monospace,monospace;font-size:11px;color:#666;margin:5px 0">${t.ll[0]}, ${t.ll[1]}</div>
     <a href="${gm(t.ll)}" target="_blank" rel="noopener" style="display:inline-block;background:#7a2f12;color:#fff;text-decoration:none;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;margin:2px 3px 0 0">📍 Maps pin</a>
     <a href="${gd(t.ll)}" target="_blank" rel="noopener" style="display:inline-block;background:#2b6cb0;color:#fff;text-decoration:none;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;margin-top:2px">🧭 Navigate</a>
   </div>`;
  L.marker(t.ll,{icon:ic}).addTo(map).bindPopup(pop,{maxWidth:230});
  leg += `<div class="r"><span class="b">${t.n}</span><span><span class="w">${t.w}</span> <span class="x">— ${t.x}</span></span></div>`;
});
if(cfg.haz) leg += `<div class="haz">${cfg.haz}</div>`;
document.getElementById('leg').innerHTML = leg;
document.querySelector('#map').insertAdjacentHTML('afterend','<div class="cred">Imagery © Esri, Maxar</div>');
</script>
</body>
</html>
